services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # If local Qdrant is running, wait for it
    depends_on:
      qdrant:
        condition: service_started
        required: false

  # ── Optional: Local Qdrant ──────────────────────
  # Only starts with:  --profile qdrant-local
  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["qdrant-local"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data: